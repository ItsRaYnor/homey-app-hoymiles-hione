<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    .disclaimer { background:#fff8e1; border-left:4px solid #ffc107;
                  padding:10px 12px; margin-bottom:16px; font-size:12px; color:#555; }
    .disclaimer a { color: #1976d2; }
    label { display:block; margin-top:12px; font-size:13px; color:#333; }
    input { width:100%; padding:8px; margin-top:4px; border:1px solid #ccc;
            border-radius:4px; box-sizing:border-box; font-size:14px; }
    button { margin-top:20px; width:100%; padding:10px; background:#00A94F;
             color:white; border:none; border-radius:4px; font-size:15px; cursor:pointer; }
    button:hover { background:#007d3a; }
    .error { color:#c00; margin-top:8px; font-size:13px; display:none; }
  </style>
</head>
<body>
  <div class='disclaimer' id='t-account'></div>
  <div class='disclaimer' id='t-disclaimer'></div>
  <label id='lbl-email'>
    <span id='t-email'></span>
    <input type='email' id='email' placeholder=''>
  </label>
  <label id='lbl-password'>
    <span id='t-password'></span>
    <input type='password' id='password'>
  </label>
  <div class='error' id='error'></div>
  <button id='t-login' onclick='proceed()'></button>
  <script>
    var i18n = {
      nl: {
        account: '<strong>Nog geen account?</strong> Maak een account aan via de S-Miles Home app:<br><a href="https://apps.apple.com/no/app/s-miles-home/id6476897806" target="_blank">Apple App Store</a> | <a href="https://play.google.com/store/apps/details?id=com.hm.balcony&hl=nl" target="_blank">Google Play Store</a>',
        disclaimer: 'Credentials worden alleen verstuurd naar <strong>hoymiles.com</strong>.<br>Deze app is niet gelieerd aan Hoymiles. Inloggen gebeurt rechtstreeks via de Hoymiles API en je gegevens worden niet voor andere doeleinden gebruikt.',
        email: 'E-mailadres',
        emailPlaceholder: 'jij@voorbeeld.nl',
        password: 'Wachtwoord',
        login: 'Inloggen',
        errorEmpty: 'Vul beide velden in.',
        errorFailed: 'Login mislukt. Controleer je gegevens.'
      },
      en: {
        account: '<strong>No account yet?</strong> Create an account via the S-Miles Home app:<br><a href="https://apps.apple.com/no/app/s-miles-home/id6476897806" target="_blank">Apple App Store</a> | <a href="https://play.google.com/store/apps/details?id=com.hm.balcony&hl=en" target="_blank">Google Play Store</a>',
        disclaimer: 'Credentials are only sent to <strong>hoymiles.com</strong>.<br>This app is not affiliated with Hoymiles. Login is handled directly via the Hoymiles API and your credentials are not used for any other purpose.',
        email: 'Email address',
        emailPlaceholder: 'you@example.com',
        password: 'Password',
        login: 'Log in',
        errorEmpty: 'Please fill in both fields.',
        errorFailed: 'Login failed. Please check your credentials.'
      }
    };

    var _lang = 'en';

    function applyLang(lang) {
      _lang = lang;
      var t = i18n[lang] || i18n.en;
      document.getElementById('t-account').innerHTML = t.account;
      document.getElementById('t-disclaimer').innerHTML = t.disclaimer;
      document.getElementById('t-email').textContent = t.email;
      document.getElementById('email').placeholder = t.emailPlaceholder;
      document.getElementById('t-password').textContent = t.password;
      document.getElementById('t-login').textContent = t.login;
    }

    Homey.getLanguage().then(function(lang) { applyLang(lang); });

    async function proceed() {
      var email = document.getElementById('email').value.trim();
      var pass  = document.getElementById('password').value;
      var errEl = document.getElementById('error');
      var t = i18n[_lang] || i18n.en;
      errEl.style.display = 'none';
      if (!email || !pass) { errEl.textContent = t.errorEmpty; errEl.style.display = 'block'; return; }
      var ok = await Homey.emit('login', { username: email, password: pass });
      if (ok) Homey.nextView();
      else { errEl.textContent = t.errorFailed; errEl.style.display = 'block'; }
    }
  </script>
</body>
</html>
